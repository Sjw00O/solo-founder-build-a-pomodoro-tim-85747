<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 - 专注与休息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            color: #e0e4f0;
            padding: 20px;
        }

        .container {
            background: rgba(18, 22, 40, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(120, 160, 255, 0.15);
            border-radius: 48px;
            padding: 40px 36px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: border-color 0.4s ease;
        }

        .container.running {
            border-color: rgba(0, 200, 255, 0.5);
        }

        .container.paused {
            border-color: rgba(255, 200, 50, 0.4);
        }

        .container.reset {
            border-color: rgba(120, 160, 255, 0.15);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #b0c4ff;
            text-shadow: 0 0 8px rgba(100, 150, 255, 0.3);
        }

        .status-badge {
            background: rgba(100, 200, 255, 0.12);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #8ab4ff;
            border: 1px solid rgba(100, 180, 255, 0.2);
            backdrop-filter: blur(4px);
        }

        .timer-display {
            text-align: center;
            margin: 20px 0 18px;
        }

        .timer-display .time {
            font-size: 5.5rem;
            font-weight: 300;
            letter-spacing: 6px;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(135deg, #e0eaff, #a0c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(80, 160, 255, 0.2);
        }

        .timer-display .phase-label {
            margin-top: 6px;
            font-size: 1rem;
            color: #7a8db3;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin: 28px 0 32px;
        }

        .controls button {
            background: rgba(30, 40, 70, 0.7);
            border: 1px solid rgba(120, 180, 255, 0.2);
            color: #c8d8ff;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.25s ease;
            min-width: 100px;
            letter-spacing: 1px;
        }

        .controls button:hover {
            background: rgba(50, 70, 130, 0.6);
            border-color: rgba(100, 180, 255, 0.5);
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(60, 140, 255, 0.15);
        }

        .controls button:active {
            transform: scale(0.97);
        }

        .controls button.primary {
            background: rgba(0, 150, 255, 0.25);
            border-color: rgba(0, 180, 255, 0.5);
            color: #b0dcff;
        }

        .controls button.primary:hover {
            background: rgba(0, 150, 255, 0.4);
        }

        .sound-section {
            margin-top: 8px;
        }

        .sound-section h3 {
            font-size: 0.9rem;
            font-weight: 400;
            color: #7a8db3;
            letter-spacing: 2px;
            margin-bottom: 14px;
            text-align: center;
        }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .sound-btn {
            background: rgba(25, 32, 60, 0.6);
            border: 1px solid rgba(120, 160, 255, 0.15);
            border-radius: 20px;
            padding: 14px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            color: #7a8db3;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .sound-btn .icon {
            font-size: 1.6rem;
            display: block;
            margin-bottom: 4px;
        }

        .sound-btn:hover {
            background: rgba(40, 55, 100, 0.5);
            border-color: rgba(100, 180, 255, 0.3);
        }

        .sound-btn.active {
            background: rgba(0, 180, 255, 0.2);
            border-color: rgba(0, 200, 255, 0.6);
            color: #b0dcff;
            box-shadow: 0 0 18px rgba(0, 180, 255, 0.15);
        }

        .footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 0.7rem;
            color: #3d4a6a;
            letter-spacing: 1px;
        }

        @media (max-width: 420px) {
            .container {
                padding: 28px 20px;
                border-radius: 32px;
            }
            .timer-display .time {
                font-size: 4rem;
            }
            .controls button {
                padding: 10px 18px;
                min-width: 80px;
                font-size: 0.9rem;
            }
            .sound-grid {
                gap: 6px;
            }
            .sound-btn {
                padding: 12px 4px;
                font-size: 0.7rem;
            }
            .sound-btn .icon {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container reset" id="appContainer">
        <div class="header">
            <h1>🍅 番茄钟</h1>
            <span class="status-badge" id="statusBadge">准备就绪</span>
        </div>

        <div class="timer-display">
            <div class="time" id="timerDisplay">25:00</div>
            <div class="phase-label" id="phaseLabel">专注</div>
        </div>

        <div class="controls">
            <button id="startPauseBtn" class="primary">▶ 开始</button>
            <button id="resetBtn">↺ 重置</button>
        </div>

        <div class="sound-section">
            <h3>🌿 环境音</h3>
            <div class="sound-grid">
                <div class="sound-btn" data-sound="rain">
                    <span class="icon">🌧️</span> 雨声
                </div>
                <div class="sound-btn" data-sound="wave">
                    <span class="icon">🌊</span> 海浪
                </div>
                <div class="sound-btn" data-sound="forest">
                    <span class="icon">🌲</span> 森林
                </div>
                <div class="sound-btn" data-sound="whitenoise">
                    <span class="icon">📡</span> 白噪音
                </div>
            </div>
        </div>

        <div class="footer-note">专注当下 · 休息即充电</div>
    </div>

    <script>
        (function() {
            // ----- 常量配置 -----
            const WORK_TIME = 25 * 60;      // 25 分钟
            const BREAK_TIME = 5 * 60;       // 5 分钟

            // ----- 状态变量 -----
            let timeLeft = WORK_TIME;
            let isRunning = false;
            let isWorkPhase = true;
            let timerInterval = null;
            let activeSounds = new Set();    // 存储当前开启的音效名称

            // ----- DOM 引用 -----
            const container = document.getElementById('appContainer');
            const timerDisplay = document.getElementById('timerDisplay');
            const phaseLabel = document.getElementById('phaseLabel');
            const statusBadge = document.getElementById('statusBadge');
            const startPauseBtn = document.getElementById('startPauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const soundBtns = document.querySelectorAll('.sound-btn');

            // ----- 辅助函数：格式化时间 mm:ss -----
            function formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            // ----- 更新 UI 显示（时间、标签、容器状态）-----
            function updateUI() {
                timerDisplay.textContent = formatTime(timeLeft);
                phaseLabel.textContent = isWorkPhase ? '专注' : '休息';

                // 更新状态徽章
                if (isRunning) {
                    statusBadge.textContent = isWorkPhase ? '专注中' : '休息中';
                    container.className = 'container running';
                } else {
                    if (timeLeft === (isWorkPhase ? WORK_TIME : BREAK_TIME)) {
                        statusBadge.textContent = '准备就绪';
                        container.className = 'container reset';
                    } else {
                        statusBadge.textContent = '已暂停';
                        container.className = 'container paused';
                    }
                }

                // 更新按钮文字
                startPauseBtn.textContent = isRunning ? '⏸ 暂停' : '▶ 开始';
            }

            // ----- 核心计时逻辑 -----
            function tick() {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateUI();
                }

                if (timeLeft <= 0) {
                    // 倒计时结束：切换阶段
                    isWorkPhase = !isWorkPhase;
                    timeLeft = isWorkPhase ? WORK_TIME : BREAK_TIME;
                    updateUI();
                    // 可添加提示音（此处略）
                }
            }

            // ----- 开始 / 暂停切换 -----
            function toggleTimer() {
                if (isRunning) {
                    // 暂停
                    clearInterval(timerInterval);
                    timerInterval = null;
                    isRunning = false;
                    updateUI();
                } else {
                    // 开始
                    isRunning = true;
                    updateUI();
                    timerInterval = setInterval(tick, 1000);
                }
            }

            // ----- 重置计时器 -----
            function resetTimer() {
                clearInterval(timerInterval);
                timerInterval = null;
                isRunning = false;
                isWorkPhase = true;
                timeLeft = WORK_TIME;
                updateUI();
            }

            // ----- 环境音切换（视觉 + 逻辑）-----
            function toggleSound(e) {
                const btn = e.currentTarget;
                const soundName = btn.dataset.sound;

                if (activeSounds.has(soundName)) {
                    // 关闭
                    activeSounds.delete(soundName);
                    btn.classList.remove('active');
                    // 实际停止音频（此处模拟，可扩展 Web Audio）
                    console.log(`🔇 停止: ${soundName}`);
                } else {
                    // 开启
                    activeSounds.add(soundName);
                    btn.classList.add('active');
                    console.log(`🔊 播放: ${soundName}`);
                }
                // 实际项目中，这里应使用 AudioContext 或 <audio> 播放/停止对应音效
                // 示例：播放占位
                // 若需要真实音频，可在此处创建 Audio 对象并控制
            }

            // ----- 事件绑定 -----
            startPauseBtn.addEventListener('click', toggleTimer);
            resetBtn.addEventListener('click', resetTimer);

            soundBtns.forEach(btn => {
                btn.addEventListener('click', toggleSound);
            });

            // ----- 初始化 UI -----
            updateUI();

            // 可选：键盘快捷键（空格切换）
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'BUTTON' || e.target.closest('.sound-btn')) return;
                if (e.code === 'Space') {
                    e.preventDefault();
                    toggleTimer();
                }
                if (e.code === 'KeyR') {
                    resetTimer();
                }
            });

        })();
    </script>
</body>
</html>
